<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}智能发票识别与自动报销填单系统{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; margin-bottom: 20px; }
  h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
  h2 { font-size: 17px; color: #444; margin-bottom: 16px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  .btn { display: inline-block; padding: 10px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
  .btn-primary { background: #4361ee; color: #fff; }
  .btn-primary:hover { background: #3651d4; }
  .btn-outline { background: #fff; color: #4361ee; border: 2px solid #4361ee; }
  .btn-outline:hover { background: #eef1ff; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-group { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #555; }
  input[type="text"], input[type="date"] { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
  input[readonly] { background: #f9fafb; color: #666; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.full { grid-template-columns: 1fr; }
  .alert { padding: 14px 18px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .alert-warning { background: #fff3cd; border: 1px solid #ffc107; color: #856404; }
  .alert-danger { background: #fde8e8; border: 1px solid #e74c3c; color: #a71d2a; }
  .alert-success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
  .field-mismatch { color: #e74c3c; font-weight: bold; }
  .mismatch-detail { font-size: 13px; color: #e74c3c; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #e5e7eb; padding: 10px 14px; text-align: left; font-size: 14px; }
  th { background: #f3f4f6; font-weight: 600; }
  .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .step { padding: 6px 14px; border-radius: 20px; font-size: 12px; background: #e5e7eb; color: #888; }
  .step.active { background: #4361ee; color: #fff; }
  .spinner { border: 4px solid #e5e7eb; border-top: 4px solid #4361ee; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-block { background: #f9fafb; border-radius: 8px; padding: 16px; margin-bottom: 12px; font-size: 13px; }
  .result-block h4 { font-size: 14px; margin-bottom: 8px; color: #4361ee; }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; color: #555; max-height: 200px; overflow-y: auto; }
  .nav-links { display: flex; justify-content: space-between; align-items: center; }
  .nav-links a { color: #4361ee; text-decoration: none; font-size: 14px; }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="container">
{% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
